[project]
name = "auto-alpha"
version = "0.1.0"
description = "A-share quantitative factor research platform."
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "plotly>=5.17.0",
    "streamlit>=1.28.0",
    "torch>=2.0.0",
    "tqdm>=4.66.0",
]

[project.optional-dependencies]
research = [
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "tushare>=1.2.89",
]

[tool.uv]
package = false
