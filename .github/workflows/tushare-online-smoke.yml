name: Legacy Tushare Entry-Point Guard

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-network-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify legacy production paths are sealed
        run: uv run pytest -q tests/test_task_055_j.py tests/test_task_055f_network.py tests/test_task_055_g_network_state.py tests/test_task_055_h_network.py tests/test_task_055_i.py
